<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio Pro</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
:root {
  --main: #38bdf8;
  --bg: #020617;
  --card: #0f172a;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: sans-serif;
}

body {
  background: var(--bg);
  color: white;
}

/* NAV */
nav {
  display: flex;
  justify-content: space-between;
  padding: 20px 8%;
  position: fixed;
  width: 100%;
  background: rgba(2,6,23,0.7);
  backdrop-filter: blur(15px);
}

.logo {
  font-size: 26px;
  font-weight: bold;
  background: linear-gradient(45deg,#38bdf8,#22c55e);
  -webkit-background-clip: text;
  color: transparent;
}

/* HERO */
.hero {
  padding: 150px 8%;
  text-align: center;
}

.hero h1 {
  font-size: 60px;
}

.typing {
  color: #38bdf8;
  border-right: 3px solid;
  white-space: nowrap;
  overflow: hidden;
  width: 0;
  animation: typing 4s steps(20) infinite alternate;
}

@keyframes typing {
  from { width: 0 }
  to { width: 250px }
}

/* SKILLS */
.section {
  padding: 80px 8%;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit,minmax(250px,1fr));
  gap: 20px;
}

.card {
  background: var(--card);
  padding: 30px;
  border-radius: 20px;
  text-align: center;
  transition: 0.4s;
  position: relative;
}

.card:hover {
  transform: scale(1.05);
  box-shadow: 0 0 30px #38bdf8;
}

.card i {
  font-size: 45px;
  margin-bottom: 10px;
  color: #38bdf8;
}

/* CONTACT FORM */
form {
  max-width: 400px;
  margin: auto;
}

input, textarea {
  width: 100%;
  margin-bottom: 10px;
  padding: 12px;
  border-radius: 10px;
  border: none;
  background: #1e293b;
  color: white;
}

button {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 10px;
  background: #38bdf8;
  font-weight: bold;
  cursor: pointer;
}
</style>
</head>

<body>

<nav>
  <div class="logo">DEV PRO</div>
</nav>

<section class="hero">
  <h1>Men <span class="typing">Full-Stack Developer</span></h1>
  <p>Zamonaviy web saytlar va tizimlar yarataman</p>
</section>

<section class="section">
  <h2>Skills</h2>
  <div class="grid">

    <div class="card">
      <i class="fab fa-html5"></i>
      <h3>HTML</h3>
    </div>

    <div class="card">
      <i class="fab fa-css3"></i>
      <h3>CSS</h3>
    </div>

    <div class="card">
      <i class="fab fa-js"></i>
      <h3>JavaScript</h3>
    </div>

  </div>
</section>

<section class="section">
  <h2>Aloqa</h2>

  <form id="contactForm">
    <input type="text" placeholder="Ism" id="name">
    <input type="email" placeholder="Email" id="email">
    <textarea placeholder="Xabar..." id="message"></textarea>
    <button type="submit">Yuborish</button>
  </form>
</section>

<script>
document.getElementById("contactForm").addEventListener("submit", async function(e){
  e.preventDefault();

  const data = {
    name: name.value,
    email: email.value,
    message: message.value
  };

  const res = await fetch("http://localhost:8080/api/contact", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify(data)
  });

  alert(await res.text());
});
</script>

</body>
</html>
